<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Verify your Senku Pay email address using the six-digit verification code sent to your inbox.">
    <meta name="theme-color" content="#070b16">

    <title>Verify Email | Senku Pay</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    >

    <link rel="stylesheet" href="verify-email.css">
</head>

<body>
    <div class="glow glow1" aria-hidden="true"></div>
    <div class="glow glow2" aria-hidden="true"></div>
    <div class="glow glow3" aria-hidden="true"></div>

    <header>
        <a href="index.html" class="logo" aria-label="Return to Senku Pay home">
            <div class="logo-box" aria-hidden="true">S</div>

            <div>
                <h2>Senku Pay</h2>
                <small>Modern Digital Payments</small>
            </div>
        </a>
    </header>

    <main>
        <section class="verify-card" aria-labelledby="verifyTitle">
            <div class="card-top">
                <div class="verify-icon" aria-hidden="true">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>

                <h1 id="verifyTitle">Verify Your Email</h1>

                <p>
                    Enter the six-digit verification code sent to
                    <strong id="maskedEmail">your email address</strong>.
                </p>
            </div>

            <div
                class="form-message"
                id="formMessage"
                role="alert"
                aria-live="polite"
                hidden
            ></div>

            <form id="verifyForm" novalidate>
                <div
                    class="otp-container"
                    id="otpContainer"
                    role="group"
                    aria-label="Six-digit verification code"
                >
                    <input
                        class="otp-input"
                        type="text"
                        inputmode="numeric"
                        autocomplete="one-time-code"
                        maxlength="1"
                        aria-label="Verification digit 1"
                    >
                    <input
                        class="otp-input"
                        type="text"
                        inputmode="numeric"
                        maxlength="1"
                        aria-label="Verification digit 2"
                    >
                    <input
                        class="otp-input"
                        type="text"
                        inputmode="numeric"
                        maxlength="1"
                        aria-label="Verification digit 3"
                    >
                    <input
                        class="otp-input"
                        type="text"
                        inputmode="numeric"
                        maxlength="1"
                        aria-label="Verification digit 4"
                    >
                    <input
                        class="otp-input"
                        type="text"
                        inputmode="numeric"
                        maxlength="1"
                        aria-label="Verification digit 5"
                    >
                    <input
                        class="otp-input"
                        type="text"
                        inputmode="numeric"
                        maxlength="1"
                        aria-label="Verification digit 6"
                    >
                </div>

                <small class="otp-error" id="otpError" aria-live="polite"></small>

                <div class="timer">
                    Code expires in
                    <span id="timer">02:00</span>
                </div>

                <div class="resend">
                    Didn't receive the code?

                    <button
                        type="button"
                        id="resend-btn"
                        disabled
                    >
                        Resend OTP
                    </button>
                </div>

                <button
                    class="verify-btn"
                    id="verifyBtn"
                    type="submit"
                >
                    <i class="fa-solid fa-check" aria-hidden="true"></i>
                    <span>Verify Code</span>
                </button>
            </form>

            <div class="security-note">
                <i class="fa-solid fa-lock" aria-hidden="true"></i>

                <p>
                    Never share your verification code with anyone. Senku Pay
                    support will never ask you to reveal it.
                </p>
            </div>

            <div class="bottom-text">
                <a href="register.html">
                    <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
                    Back to Registration
                </a>
            </div>
        </section>
    </main>

    <script src="verify-email.js"></script>
</body>
</html>
